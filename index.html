<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itsz.ayaz</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p id="loading-text">YÜKLENİYOR... 0%</p>
    </div>

    <div id="enter-screen" style="display: none;">
        <p>GİRİŞ YAPMAK İÇİN TIKLA</p>
    </div>

    <div id="app-container">
        <video id="bg-video" loop playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <main class="content">
            <div class="profile-section">
                <!-- Buradaki pfp.jpg kullanıcının yüklediği resim olmalı -->
                <div class="pfp-container">
                    <img src="pfp.png" alt="Profile" id="pfp">
                </div>
                <h1 id="username">itsz.ayaz</h1>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const enterScreen = document.getElementById('enter-screen');
        const app = document.getElementById('app-container');

        let isReady = false;

        // Video yükleme takibi
        function updateProgress() {
            if (isReady) return;

            const duration = video.duration;
            const buffered = video.buffered;

            if (duration > 0 && buffered.length > 0) {
                const percent = (buffered.end(0) / duration) * 100;
                loadingText.innerText = `YÜKLENİYOR... %${Math.round(percent)}`;
                
                // %15 dolunca veya video oynamaya hazır olduğunda giriş ekranını göster
                if (percent > 15) { 
                     showEnterScreen();
                }
            } else {
                loadingText.innerText = "VARLIKLAR HAZIRLANIYOR...";
            }
        }

        video.addEventListener('progress', updateProgress);
        video.addEventListener('loadedmetadata', updateProgress);
        
        // Video oynamaya hazır olduğunda
        video.oncanplaythrough = () => {
            showEnterScreen();
        };

        // Yedek Plan: Eğer 10 saniye içinde açılmazsa ama video iniyorsa butonu göster
        setTimeout(() => {
            if (video.buffered.length > 0) {
                showEnterScreen();
            }
        }, 10000);

        function showEnterScreen() {
            if (isReady) return;
            isReady = true;

            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                enterScreen.style.display = 'flex';
                enterScreen.style.opacity = '1';
            }, 500);
        }

        function startApp() {
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                app.style.opacity = '1';
                video.play();
                video.muted = false;
            }, 500);
        }

        enterScreen.addEventListener('click', startApp);
    </script>
</body>
</html>
