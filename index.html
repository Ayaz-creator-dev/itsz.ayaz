<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itsz.ayaz</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <p id="loading-text">YÜKLENİYOR... 0%</p>
    </div>

    <div id="enter-screen" style="display: none;">
        <p>GİRİŞ YAPMAK İÇİN TIKLA</p>
    </div>

    <div id="app-container">
        <video id="bg-video" loop playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <main class="content">
            <div class="profile-section">
                <!-- Buradaki pfp.jpg kullanıcının yüklediği resim olmalı -->
                <div class="pfp-container">
                    <img src="pfp.png" alt="Profile" id="pfp">
                </div>
                <h1 id="username">itsz.ayaz</h1>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('bg-video');
        const loadingScreen = document.getElementById('loading-screen');
        const loadingText = document.getElementById('loading-text');
        const enterScreen = document.getElementById('enter-screen');
        const app = document.getElementById('app-container');

        // Video yükleme takibi
        video.addEventListener('progress', () => {
            if (video.duration > 0) {
                const buffered = video.buffered;
                if (buffered.length > 0) {
                    const percent = (buffered.end(0) / video.duration) * 100;
                    loadingText.innerText = `YÜKLENİYOR... ${Math.round(percent)}%`;
                    
                    if (percent > 30) { // %30 dolunca giriş ekranını hazırla
                         showEnterScreen();
                    }
                }
            }
        });

        // Alternatif olarak video hazır olduğunda
        video.oncanplaythrough = () => {
            showEnterScreen();
        };

        function showEnterScreen() {
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    enterScreen.style.display = 'flex';
                    enterScreen.style.opacity = '1';
                }, 500);
            }
        }

        function startApp() {
            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                app.style.opacity = '1';
                video.play();
                video.muted = false;
            }, 500);
        }

        // Tıklama eventini enter-screen'e ekle
        enterScreen.addEventListener('click', startApp);
    </script>
</body>
</html>
