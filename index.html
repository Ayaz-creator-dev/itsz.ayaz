<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itsz.ayaz</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="enter-screen" onclick="startApp()">
        <p>GİRİŞ YAPMAK İÇİN TIKLA</p>
    </div>

    <div id="app-container">
        <video id="bg-video" loop playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <main class="content">
            <div class="profile-section">
                <!-- Buradaki pfp.jpg kullanıcının yüklediği resim olmalı -->
                <div class="pfp-container">
                    <img src="pfp.png" alt="Profile" id="pfp">
                </div>
                <h1 id="username">itsz.ayaz</h1>
            </div>
        </main>
    </div>

    <script>
        function startApp() {
            const video = document.getElementById('bg-video');
            const enterScreen = document.getElementById('enter-screen');
            const app = document.getElementById('app-container');

            enterScreen.style.opacity = '0';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                app.style.opacity = '1';
                video.play();
                video.muted = false;
            }, 500);
        }
    </script>
</body>
</html>
